<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const PROBLEMS = [
  { chip:'P1', ko:'Hello, World! 출력',  en:'Hello, World! Output',   type:{ko:'코드',   en:'Code'},   typeColor:'#2563eb', typeBg:'rgba(37,99,235,.1)',  submitted:22, total:24, pct:92 },
  { chip:'P2', ko:'변수 선언과 출력',      en:'Declare &amp; Print Var', type:{ko:'코드',   en:'Code'},   typeColor:'#2563eb', typeBg:'rgba(37,99,235,.1)',  submitted:18, total:24, pct:75 },
  { chip:'P3', ko:'자료형 맞추기',         en:'Match the Data Types',   type:{ko:'객관식', en:'MCQ'},    typeColor:'#7c3aed', typeBg:'rgba(124,58,237,.1)', submitted:10, total:24, pct:42 },
  { chip:'P4', ko:'정수↔실수 형변환',      en:'Int ↔ Float Cast',       type:{ko:'단답형', en:'Short'},  typeColor:'#0891b2', typeBg:'rgba(8,145,178,.1)',  submitted:5,  total:24, pct:21 },
  { chip:'P5', ko:'문자열 기본 연산',       en:'String Basics',          type:{ko:'코드',   en:'Code'},   typeColor:'#2563eb', typeBg:'rgba(37,99,235,.1)',  submitted:2,  total:24, pct:8  },
];

const STUDENT_STATUS = {
  P1: { ko:'정답 ✓',   en:'Correct ✓',   color:'#059669', bg:'rgba(16,185,129,.12)' },
  P2: { ko:'정답 ✓',   en:'Correct ✓',   color:'#059669', bg:'rgba(16,185,129,.12)' },
  P3: { ko:'오답 ✗',   en:'Wrong ✗',     color:'#dc2626', bg:'rgba(220,38,38,.1)'   },
  P4: { ko:'제출 완료', en:'Submitted',   color:'#2563eb', bg:'rgba(37,99,235,.09)'  },
  P5: { ko:'미제출',    en:'Not Submitted',color:'#9ca3af', bg:'#f1f5f9'             },
};

// ─── State ──────────────────────────────────────────────────────────────────
let lang = 'ko';
let sharing = null; // chip string or null

// ─── Helpers ────────────────────────────────────────────────────────────────
function t(obj) { return obj[lang]; }

function pill(labelObj, color, bg) {
  const label = typeof labelObj === 'string' ? labelObj : t(labelObj);
  return `<span style="display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:999px;background:${bg};color:${color};font-size:16px;font-weight:600;white-space:nowrap;flex-shrink:0;">${label}</span>`;
}

function progFill(pct, color) {
  return `<div style="height:100%;border-radius:999px;background:${color||'#2563eb'};width:${pct}%;transition:width .3s ease;"></div>`;
}

// ─── Render Teacher Problems ─────────────────────────────────────────────────
function renderTeacherProblems() {
  const list = document.getElementById('teacher-problem-list');
  if (!list) return;

  list.innerHTML = PROBLEMS.map(p => {
    const isSharing = sharing === p.chip;
    const submittedLabel = lang === 'ko'
      ? `${p.submitted} / ${p.total}명 제출`
      : `${p.submitted} / ${p.total} submitted`;

    const shareBtn = isSharing
      ? `<button type="button" onclick="toggleShare('${p.chip}')" style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border:1.5px solid #3b82f6;background:rgba(37,99,235,.08);border-radius:8px;font-size:16px;font-weight:600;color:#2563eb;cursor:pointer;white-space:nowrap;flex-shrink:0;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><path d="M2 12a9 9 0 0 1 8 8"/><path d="M2 16a5 5 0 0 1 4 4"/><circle cx="2" cy="20" r="2"/></svg>
          <span>${lang === 'ko' ? '공유 중' : 'Sharing'}</span>
        </button>`
      : `<button type="button" class="btn-share" onclick="toggleShare('${p.chip}')" style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;font-size:16px;color:#374151;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:border-color .15s,background .15s;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><path d="M2 12a9 9 0 0 1 8 8"/><path d="M2 16a5 5 0 0 1 4 4"/><circle cx="2" cy="20" r="2"/></svg>
          <span>${lang === 'ko' ? '화면 공유' : 'Share Screen'}</span>
        </button>`;

    return `<div class="problem-row" style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #f0f3f8;border-radius:12px;padding:14px 16px;transition:border-color .15s,box-shadow .15s;">
      <div style="width:42px;height:42px;border-radius:10px;background:rgba(37,99,235,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:17px;font-weight:700;color:#2563eb;letter-spacing:-.02em;">${p.chip}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:17px;font-weight:600;color:#111827;letter-spacing:-.01em;line-height:1.3;">${t(p)}</div>
        <div style="margin-top:6px;">${pill(p.type, p.typeColor, p.typeBg)}</div>
      </div>
      <div style="flex-shrink:0;width:186px;">
        <div style="font-size:16px;font-weight:500;color:#374151;margin-bottom:6px;">${submittedLabel}</div>
        <div style="height:6px;border-radius:999px;background:#e5e7eb;overflow:hidden;">${progFill(p.pct)}</div>
      </div>
      ${shareBtn}
    </div>`;
  }).join('');
}

// ─── Render Sharing Banner ───────────────────────────────────────────────────
function renderSharingBanner() {
  const banner = document.getElementById('sharing-banner');
  const text = document.getElementById('sharing-banner-text');
  const stopBtn = banner.querySelector('button');

  if (sharing) {
    const p = PROBLEMS.find(x => x.chip === sharing);
    banner.style.display = 'flex';
    if (lang === 'ko') {
      text.textContent = `학생 화면에 ${p.chip} · ${t(p)} 공유 중`;
      stopBtn.textContent = '공유 중단';
    } else {
      text.textContent = `Sharing ${p.chip} · ${t(p)} to students`;
      stopBtn.textContent = 'Stop Sharing';
    }
  } else {
    banner.style.display = 'none';
  }
}

// ─── Render Student Problems ─────────────────────────────────────────────────
function renderStudentProblems() {
  const list = document.getElementById('student-problem-list');
  if (!list) return;

  list.innerHTML = PROBLEMS.map(p => {
    const st = STUDENT_STATUS[p.chip];
    return `<div class="student-problem-card" style="display:flex;align-items:center;gap:14px;background:#ffffff;border:1px solid #f0f3f8;border-radius:12px;padding:16px 18px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s;">
      <div style="width:42px;height:42px;border-radius:10px;background:rgba(37,99,235,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:17px;font-weight:700;color:#2563eb;letter-spacing:-.02em;">${p.chip}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:17px;font-weight:600;color:#111827;letter-spacing:-.01em;line-height:1.3;">${t(p)}</div>
        <div style="margin-top:6px;">${pill(p.type, p.typeColor, p.typeBg)}</div>
      </div>
      ${pill(st, st.color, st.bg)}
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m9 18 6-6-6-6"/></svg>
    </div>`;
  }).join('');
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function toggleShare(chip) {
  sharing = (sharing === chip) ? null : chip;
  renderTeacherProblems();
  renderSharingBanner();
}

function stopSharing() {
  sharing = null;
  renderTeacherProblems();
  renderSharingBanner();
}

// ─── Language ────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;

  document.querySelectorAll('[data-ko]').forEach(el => {
    el.textContent = el.dataset[l] || el.dataset.ko;
  });

  document.getElementById('btn-ko').style.cssText =
    l === 'ko'
      ? 'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
      : 'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';
  document.getElementById('btn-en').style.cssText =
    l === 'en'
      ? 'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
      : 'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';

  renderTeacherProblems();
  renderSharingBanner();
  renderStudentProblems();
}

// ─── Init ────────────────────────────────────────────────────────────────────
renderTeacherProblems();
renderSharingBanner();
renderStudentProblems();
setLang('ko');
</script>
</body>
</html>
