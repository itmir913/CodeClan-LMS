<!DOCTYPE html>
<html lang="ko">
<head>

<style>

<body>
<div style="padding:44px 28px 80px;">
<div style="max-width:1260px;margin:0 auto;">

<div style="margin-bottom:12px;">

  <h1 style="font-size:28px;font-weight:700;letter-spacing:-.02em;color:#1e293b;">출석 관리 — 출석부 / 날짜별 입력</h1>
</div>

<div style="display:flex;align-items:center;gap:8px;margin-bottom:36px;">

<!-- ════════════════════════════════════════════════════ -->

</div>

<div style="display:flex;align-items:stretch;border-radius:16px;overflow:hidden;box-shadow:0 24px 52px -18px rgba(15,23,42,.28),0 0 0 1px rgba(15,23,42,.07);margin-bottom:64px;min-height:600px;">

  <!-- Sidebar (출석 active) -->

    <div style="padding:20px 16px 0;"><button class="nav-back" style="display:flex;align-items:center;gap:7px;height:34px;padding:0 8px;margin:0 -8px;border:none;background:transparent;border-radius:7px;color:#64748b;font-size:16px;transition:color .15s,background .15s;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg><span data-ko="내 수업" data-en="My Classes"></span></button><div style="margin-top:16px;padding-bottom:20px;"><div style="font-size:17px;font-weight:700;color:#f1f5f9;" data-ko="정보과학 1반" data-en="CS Class 1"></div><div style="font-size:16px;color:#64748b;margin-top:4px;" data-ko="3학년 1반 · 정보과" data-en="Grade 3–1 · Informatics"></div></div></div>
    <div style="height:1px;background:#1e293b;margin:0 16px;"></div>
    <nav style="padding:12px 10px 0;display:flex;flex-direction:column;gap:2px;">
      <a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span data-ko="차시" data-en="Lessons"></span></a>
      <a style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;box-shadow:inset 3px 0 0 #93c5fd;background:rgba(147,197,253,.1);color:#f8fafc;font-size:16px;font-weight:600;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg><span data-ko="출석" data-en="Attendance"></span></a>
      <a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg><span data-ko="수업 운영" data-en="Assessments"></span></a>
    </nav>
    <div style="flex:1;"></div>
    <div style="height:1px;background:#1e293b;margin:0 16px 12px;"></div>
    <nav style="padding:0 10px;display:flex;flex-direction:column;gap:2px;">

    </nav>
    <div style="padding:10px 10px 18px;margin-top:8px;"><button class="nav-user" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:transparent;border-radius:9px;text-align:left;transition:background .15s;"><div style="width:34px;height:34px;border-radius:999px;background:rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#93c5fd;" data-ko="김" data-en="K"></div><span style="flex:1;font-size:16px;font-weight:500;color:#b8c5d3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" data-ko="김정보 선생님" data-en="Teacher Kim"></span></button></div>

  <!-- MAIN -->

    </header>

    <div style="padding:24px 28px 32px;flex:1;overflow:auto;">

      <!-- Section header + stats -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap;">

        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            <span data-ko="오늘 출석 입력" data-en="Record Today"></span>
          </button>
          <button class="btn-ghost" style="display:flex;align-items:center;gap:6px;height:38px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;font-size:16px;color:#374151;transition:background .15s,border-color .15s;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-ko="CSV 내보내기" data-en="Export CSV"></span>
          </button>
        </div>
      </div>

      <!-- Legend -->
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;" id="att-legend"></div>

      <!-- Attendance grid -->
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
        <div style="overflow-x:auto;">
          <table id="att-grid" style="border-collapse:collapse;min-width:700px;"></table>
        </div>
      </div>

    </div>
  </div>
</div>
<!-- END FRAME A -->


<!-- ════════════════════════════════════════════════════ -->
<!-- FRAME B — 날짜별 출석 입력                            -->
<!-- ════════════════════════════════════════════════════ -->
<div id="frame-b-check" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
  <span style="display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:999px;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:700;" data-ko="날짜별 입력" data-en="Daily Entry"></span>
  <span style="font-size:16px;color:#94a3b8;font-weight:500;" data-ko="특정 날짜 출석 상태 일괄 입력 · 수동 수정" data-en="Enter or edit attendance for a specific date"></span>
</div>

<div style="display:flex;align-items:stretch;border-radius:16px;overflow:hidden;box-shadow:0 24px 52px -18px rgba(15,23,42,.28),0 0 0 1px rgba(15,23,42,.07);margin-bottom:64px;min-height:580px;">

  <!-- Sidebar (출석 active) — identical -->
  <aside style="width:240px;flex-shrink:0;background:#0f172a;display:flex;flex-direction:column;">
    <div style="padding:20px 16px 0;"><button class="nav-back" style="display:flex;align-items:center;gap:7px;height:34px;padding:0 8px;margin:0 -8px;border:none;background:transparent;border-radius:7px;color:#64748b;font-size:16px;transition:color .15s,background .15s;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg><span data-ko="내 수업" data-en="My Classes"></span></button><div style="margin-top:16px;padding-bottom:20px;"><div style="font-size:17px;font-weight:700;color:#f1f5f9;" data-ko="정보과학 1반" data-en="CS Class 1"></div><div style="font-size:16px;color:#64748b;margin-top:4px;" data-ko="3학년 1반 · 정보과" data-en="Grade 3–1 · Informatics"></div></div></div>
    <div style="height:1px;background:#1e293b;margin:0 16px;"></div>
    <nav style="padding:12px 10px 0;display:flex;flex-direction:column;gap:2px;"><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span data-ko="차시" data-en="Lessons"></span></a><a style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;box-shadow:inset 3px 0 0 #93c5fd;background:rgba(147,197,253,.1);color:#f8fafc;font-size:16px;font-weight:600;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg><span data-ko="출석" data-en="Attendance"></span></a><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg><span data-ko="수업 운영" data-en="Assessments"></span></a></nav>
    <div style="flex:1;"></div>
    <div style="height:1px;background:#1e293b;margin:0 16px 12px;"></div>
    <nav style="padding:0 10px;display:flex;flex-direction:column;gap:2px;"><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg><span data-ko="수업 관리" data-en="Class Settings"></span></a><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span data-ko="학생" data-en="Students"></span></a></nav>
    <div style="padding:10px 10px 18px;margin-top:8px;"><button class="nav-user" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:transparent;border-radius:9px;text-align:left;transition:background .15s;"><div style="width:34px;height:34px;border-radius:999px;background:rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#93c5fd;" data-ko="김" data-en="K"></div><span style="flex:1;font-size:16px;font-weight:500;color:#b8c5d3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" data-ko="김정보 선생님" data-en="Teacher Kim"></span></button></div>
  </aside>

  <div style="flex:1;min-width:0;background:#f8fafc;display:flex;flex-direction:column;">

      <span style="font-size:18px;font-weight:600;color:#111827;" data-ko="정보과학 1반" data-en="CS Class 1"></span>
    </header>

    <div style="padding:24px 28px 32px;flex:1;overflow-y:auto;">

      <!-- Date header + nav -->

        <button class="btn-ghost" style="width:36px;height:36px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 style="font-size:20px;font-weight:700;color:#111827;" data-ko="2025년 6월 14일 (토)" data-en="Saturday, June 14, 2025"></h2>
        <button class="btn-ghost" style="width:36px;height:36px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <span style="font-size:16px;color:#9ca3af;" data-ko="6차시" data-en="Lesson 6"></span>

          <button id="bulk-reset" onclick="setBulk('absent')" style="height:34px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;font-size:16px;color:#374151;transition:background .15s;" class="btn-ghost" data-ko="전체 결석" data-en="All Absent"></button>
        </div>
      </div>

      <!-- Legend (B) -->
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;" id="att-legend-b"></div>

      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:20px;">

          <button class="btn-ghost" style="height:40px;padding:0 16px;border:1px solid #e5e7eb;background:#fff;border-radius:9px;font-size:16px;color:#374151;transition:background .15s,border-color .15s;" data-ko="← 출석부로" data-en="← Back to Sheet"></button>

<script>
let lang = 'ko';

// ─── Status definitions ────────────────────────────────────────────────────────
const STATUSES = {
  present: { ko:'출석', en:'Present', symbol:'✓', color:'#059669', bg:'rgba(5,150,105,.1)',  border:'rgba(5,150,105,.3)'  },
  late:    { ko:'지각', en:'Late',    symbol:'△', color:'#d97706', bg:'rgba(217,119,6,.1)',   border:'rgba(217,119,6,.3)'  },
  absent:  { ko:'결석', en:'Absent',  symbol:'✗', color:'#dc2626', bg:'rgba(220,38,38,.1)',   border:'rgba(220,38,38,.3)'  },
  early:   { ko:'조퇴', en:'Left Early', symbol:'◷', color:'#7c3aed', bg:'rgba(124,58,237,.1)', border:'rgba(124,58,237,.3)' },
};

// ─── Data ─────────────────────────────────────────────────────────────────────
const STUDENT_NAMES_KO = ['김민수','이수빈','박지훈','최예은','정도현','한소희','오준혁','임채원'];
const STUDENT_NAMES_EN = ['Min-su K.','Su-bin L.','Ji-hun P.','Ye-eun C.','Do-hyeon J.','So-hee H.','Jun-hyeok O.','Chae-won I.'];

// Dates (6 lessons)
const DATES_KO = ['5/3','5/10','5/17','5/24','5/31','6/14'];
const DATES_EN = ['May 3','May 10','May 17','May 24','May 31','Jun 14'];

// attendance[student][date] = status key
const ATT_DATA = [
  ['present','present','present','present','late',   'present'],
  ['present','present','late',   'present','present','present'],
  ['present','absent', 'present','present','present','late'   ],
  ['present','present','present','present','present','present'],
  ['absent', 'present','present','absent', 'present','present'],
  ['present','present','present','late',   'present','present'],
  ['present','present','late',   'present','absent', 'present'],
  ['present','present','present','present','present','early'  ],
];

// Frame B: today's (6th column) attendance, mutable
let todayAtt = ATT_DATA.map(row => row[5]);

// ─── Frame A: attendance grid ──────────────────────────────────────────────────
function renderAttGrid() {
  const el = document.getElementById('att-grid');
  if (!el) return;
  const names = lang === 'ko' ? STUDENT_NAMES_KO : STUDENT_NAMES_EN;
  const dates = lang === 'ko' ? DATES_KO : DATES_EN;

  const thStyle = 'padding:10px 14px;font-size:16px;font-weight:600;color:#6b7280;text-align:center;border-bottom:1px solid #e5e7eb;background:#f8fafc;white-space:nowrap;';
  const nameTh  = 'padding:10px 16px;font-size:16px;font-weight:600;color:#6b7280;text-align:left;border-bottom:1px solid #e5e7eb;background:#f8fafc;white-space:nowrap;';

  const header = `<thead><tr>
    <th style="${thStyle}text-align:right;min-width:44px;">${lang==='ko'?'번호':'No.'}</th>
    <th style="${nameTh}min-width:110px;">${lang==='ko'?'이름':'Name'}</th>
    ${dates.map(d=>`<th style="${thStyle}">${d}</th>`).join('')}
    <th style="${thStyle}color:#2563eb;">${lang==='ko'?'출석률':'Rate'}</th>
  </tr></thead>`;

  const rows = ATT_DATA.map((row, si) => {
    const total = row.length;
    const presentCount = row.filter(s => s === 'present').length;
    const rate = Math.round(presentCount / total * 100);
    const rateColor = rate >= 90 ? '#059669' : rate >= 70 ? '#d97706' : '#dc2626';
    const tdBase = 'padding:0;text-align:center;border-bottom:1px solid #f0f3f8;';
    return `<tr>
      <td style="padding:10px 14px;font-size:16px;color:#9ca3af;text-align:right;border-bottom:1px solid #f0f3f8;font-family:'JetBrains Mono',ui-monospace,monospace;">${si+1}</td>
      <td style="padding:10px 16px;font-size:16px;font-weight:500;color:#111827;border-bottom:1px solid #f0f3f8;white-space:nowrap;">${names[si]}</td>
      ${row.map((st, di) => {
        const s = STATUSES[st];
        const isToday = di === 5;
        return `<td style="${tdBase}">
          <button class="att-cell" onclick="cycleStatus(${si},${di})" title="${s[lang]}"
            style="width:100%;height:42px;border:none;background:${s.bg};color:${s.color};font-size:17px;font-weight:700;${isToday?'outline:2px solid '+s.border+';outline-offset:-2px;':''}">${s.symbol}<span style="display:block;font-size:16px;font-weight:500;line-height:1;">${s[lang]}</span></button>
        </td>`;
      }).join('')}
      <td style="padding:10px 14px;text-align:center;border-bottom:1px solid #f0f3f8;font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:700;color:${rateColor};font-size:16px;">${rate}%</td>
    </tr>`;
  }).join('');

  el.innerHTML = header + `<tbody>${rows}</tbody>`;
}

function cycleStatus(si, di) {
  const cycle = ['present','late','absent','early'];
  const cur = ATT_DATA[si][di];
  const next = cycle[(cycle.indexOf(cur) + 1) % cycle.length];
  ATT_DATA[si][di] = next;
  if (di === 5) todayAtt[si] = next;
  renderAttGrid();
  renderSummary();
}

function renderSummary() {
  const el = document.getElementById('att-summary');
  if (!el) return;
  const counts = { present:0, late:0, absent:0, early:0 };
  ATT_DATA.forEach(row => row.forEach(s => counts[s]++));
  const total = ATT_DATA.length * ATT_DATA[0].length;
  const rate = Math.round(counts.present / total * 100);
  el.innerHTML = [
    `<span style="display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 12px;border-radius:999px;background:rgba(37,99,235,.08);font-size:16px;color:#2563eb;font-weight:600;">${lang==='ko'?`총 6회 수업 · 출석률 ${rate}%`:`6 lessons · ${rate}% attendance rate`}</span>`,
    ...Object.entries(counts).map(([k,v]) => {
      const s = STATUSES[k];
      return `<span style="display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 10px;border-radius:999px;background:${s.bg};font-size:16px;color:${s.color};font-weight:600;">${s.symbol} ${s[lang]} ${v}${lang==='ko'?'건':'×'}</span>`;
    }),
  ].join('');
}

function renderLegend(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = Object.entries(STATUSES).map(([,s]) =>
    `<span style="display:inline-flex;align-items:center;gap:5px;font-size:16px;color:#6b7280;">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;background:${s.bg};color:${s.color};font-size:14px;font-weight:700;">${s.symbol}</span>
      ${s[lang]}
    </span>`
  ).join('');
}

// ─── Frame B: per-date check ───────────────────────────────────────────────────
function renderCheckRows() {
  const el = document.getElementById('check-rows');
  const summEl = document.getElementById('check-summary-label');
  if (!el) return;
  const names = lang === 'ko' ? STUDENT_NAMES_KO : STUDENT_NAMES_EN;

  el.innerHTML = todayAtt.map((st, i) => {
    const cur = STATUSES[st];
    return `<div class="student-att-row" style="display:grid;grid-template-columns:56px 1fr 260px;border-bottom:1px solid #f8fafc;align-items:center;padding:4px 0;transition:background .1s;">
      <div style="padding:0 20px;font-size:16px;color:#9ca3af;font-family:'JetBrains Mono',ui-monospace,monospace;">${i+1}</div>
      <div style="padding:0 8px;font-size:16px;font-weight:500;color:#111827;">${names[i]}</div>
      <div style="padding:6px 20px;display:flex;gap:6px;">
        ${Object.entries(STATUSES).map(([key, s]) =>
          `<button onclick="setStudentStatus(${i},'${key}')" style="height:34px;padding:0 12px;border-radius:8px;border:1.5px solid ${st===key?s.border:'#e5e7eb'};background:${st===key?s.bg:'#fff'};color:${st===key?s.color:'#9ca3af'};font-size:16px;font-weight:${st===key?'700':'400'};transition:all .12s;">
            ${s.symbol} ${s[lang]}
          </button>`
        ).join('')}
      </div>
    </div>`;
  }).join('');

  if (summEl) {
    const counts = { present:0, late:0, absent:0, early:0 };
    todayAtt.forEach(s => counts[s]++);
    summEl.textContent = lang === 'ko'
      ? `출석 ${counts.present}명 · 지각 ${counts.late}명 · 결석 ${counts.absent}명 · 조퇴 ${counts.early}명`
      : `Present ${counts.present} · Late ${counts.late} · Absent ${counts.absent} · Left Early ${counts.early}`;
  }
}

function setStudentStatus(i, key) {
  todayAtt[i] = key;
  ATT_DATA[i][5] = key;
  renderCheckRows();
  renderAttGrid();
  renderSummary();
}

function setBulk(status) {
  todayAtt = todayAtt.map(() => status);
  todayAtt.forEach((s, i) => { ATT_DATA[i][5] = s; });
  renderCheckRows();
  renderAttGrid();
  renderSummary();
}

function saveAttendance() {
  alert(lang==='ko'?'[저장 완료 — 출석부로 돌아갑니다]':'[Saved — returning to attendance sheet]');
}
function showCheckFrame() {
  document.getElementById('frame-b-check').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ─── Language ──────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-ko]').forEach(el => {
    const val = el.dataset[l] || el.dataset.ko;
    if (val !== undefined) el.textContent = val;
  });
  document.getElementById('btn-ko').style.cssText = l==='ko'
    ?'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    :'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';
  document.getElementById('btn-en').style.cssText = l==='en'
    ?'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    :'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';
  renderAttGrid();
  renderSummary();
  renderLegend('att-legend');
  renderLegend('att-legend-b');
  renderCheckRows();
}

// ─── Init ──────────────────────────────────────────────────────────────────────
setLang('ko');
</script>
</body>
</html>
