<body>

<div style="padding:44px 28px 80px;">
<div style="max-width:1260px;margin:0 auto;">

<!-- PAGE HEADER -->
<div style="margin-bottom:12px;">

  <h1 style="font-size:28px;font-weight:700;letter-spacing:-.02em;color:#1e293b;">문제 풀기 — 교사 현황 / 학생 풀이 4유형</h1>

        <span data-ko="수업 관리" data-en="Class Settings"></span>
      </a>
      <a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="page-nav-btn" style="height:30px;padding:0 12px;border:1px solid #e5e7eb;background:#fff;border-radius:7px;font-size:16px;color:#374151;display:flex;align-items:center;gap:4px;transition:border-color .15s,background .15s;">

      <!-- LEFT: Problem content -->
      <div style="flex:1;min-width:0;padding:24px 24px 32px;overflow-y:auto;">

        <!-- Problem header -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
          <span style="display:inline-flex;align-items:center;height:28px;padding:0 10px;border-radius:7px;background:#f1f5f9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;font-weight:700;color:#334155;">P 03</span>
          <span style="display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:999px;background:#dbeafe;color:#2563eb;font-size:16px;font-weight:600;" data-ko="코딩" data-en="Coding"></span>
        </div>

        <h2 style="font-size:20px;font-weight:700;color:#111827;line-height:1.4;margin-bottom:12px;" data-ko="1부터 N까지의 합을 구하시오" data-en="Find the Sum from 1 to N"></h2>

        <p style="font-size:16px;color:#374151;line-height:1.7;margin-bottom:20px;" data-ko="정수 N이 주어졌을 때, 1부터 N까지 모든 정수의 합을 구하는 프로그램을 작성하시오. 표준 입력으로 N을 입력받아 표준 출력으로 결과를 출력한다." data-en="Given an integer N, write a program that computes the sum of all integers from 1 to N. Read N from standard input and print the result to standard output."></p>

        <!-- Example I/O -->
        <div style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:24px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;">
            <div style="padding:14px 16px;border-right:1px solid #e5e7eb;">
              <div style="font-size:16px;font-weight:600;color:#6b7280;margin-bottom:8px;" data-ko="입력 예시" data-en="Sample Input"></div>
              <pre style="font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;color:#111827;background:none;margin:0;">5</pre>
            </div>
            <div style="padding:14px 16px;">
              <div style="font-size:16px;font-weight:600;color:#6b7280;margin-bottom:8px;" data-ko="출력 예시" data-en="Sample Output"></div>
              <pre style="font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;color:#111827;background:none;margin:0;">15</pre>
            </div>
          </div>
        </div>

        <!-- Answer reveal toggle card -->
        <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <div>
              <div style="font-size:16px;font-weight:600;color:#111827;" data-ko="정답 공개" data-en="Reveal Answer"></div>
              <div id="answer-reveal-desc" style="font-size:16px;color:#9ca3af;margin-top:2px;" data-ko-off="켜면 학생 화면에 정답이 표시됩니다" data-en-off="Enable to show the answer to students" data-ko-on="현재 학생 화면에 정답이 공개되어 있습니다" data-en-on="Answer is currently visible to students"></div>

          </div>
        </div>

      </div>

      <!-- RIGHT: Student submission panel -->
      <div style="width:320px;flex-shrink:0;border-left:1px solid #e5e7eb;background:#f8fafc;display:flex;flex-direction:column;">

        <!-- Panel header -->
        <div style="padding:16px 18px 12px;border-bottom:1px solid #e5e7eb;background:#fff;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
            <span style="font-size:17px;font-weight:700;color:#111827;" data-ko="제출 현황" data-en="Submissions"></span>
            <span style="font-size:16px;font-weight:600;color:#374151;font-family:'JetBrains Mono',ui-monospace,monospace;">19 / 32</span>
            <!-- live dot -->

              <span style="position:relative;width:8px;height:8px;border-radius:999px;background:#10b981;animation:livePulse 2s ease-in-out infinite;"></span>
            </span>
          </div>
        </div>

        <!-- Student list -->

            <span style="font-size:16px;font-weight:700;color:#059669;font-family:'JetBrains Mono',ui-monospace,monospace;">73%</span>

            <div style="display:flex;align-items:center;gap:4px;font-size:16px;color:#6b7280;">

              <span data-ko="정답 14" data-en="Correct 14"></span>

            <div style="display:flex;align-items:center;gap:4px;font-size:16px;color:#6b7280;">
              <span style="width:8px;height:8px;border-radius:999px;background:#dc2626;"></span>
              <span data-ko="오답 3" data-en="Wrong 3"></span>

            <div style="display:flex;align-items:center;gap:4px;font-size:16px;color:#6b7280;">

              <span data-ko="풀이중 2" data-en="Working 2"></span>
            </div>
          </div>
        </div>
      </div>

    </div><!-- end 2-panel -->
  </div><!-- end main -->
</div>

      <button class="page-nav-btn" style="height:30px;padding:0 12px;border:1px solid #e5e7eb;background:#fff;border-radius:7px;font-size:16px;color:#374151;display:flex;align-items:center;gap:4px;transition:border-color .15s,background .15s;">

  { ko:'박지훈', en:'Ji-hun Park',   status:'wrong'    },
  { ko:'최예은', en:'Ye-eun Choi',   status:'working'  },
  { ko:'정도현', en:'Do-hyeon Jung', status:'correct'  },
  { ko:'한소희', en:'So-hee Han',    status:'none'     },
  { ko:'오준혁', en:'Jun-hyeok Oh',  status:'wrong'    },
  { ko:'임채원', en:'Chae-won Lim',  status:'none'     },
  { ko:'윤서연', en:'Seo-yeon Yun',  status:'correct'  },
  { ko:'강민호', en:'Min-ho Kang',   status:'working'  },
  { ko:'조은빈', en:'Eun-bin Cho',   status:'correct'  },
  { ko:'신유나', en:'Yu-na Shin',    status:'correct'  },
];

const STATUS_META = {
  correct: { ko:'✓ 정답', en:'✓ Correct', color:'#059669', bg:'rgba(16,185,129,.12)' },
  wrong:   { ko:'✗ 오답', en:'✗ Wrong',   color:'#dc2626', bg:'rgba(220,38,38,.1)'   },
  working: { ko:'풀이중',  en:'Working',   color:'#b45309', bg:'rgba(245,158,11,.12)' },
  none:    { ko:'—',       en:'—',         color:'#9ca3af', bg:'#f1f5f9'              },
};

// ─── State ───────────────────────────────────────────────────────────────────
let lang = 'ko';
let answerRevealed = false;
let sharingProblem = false;
let oxSelected = 'O';

// ─── Render student list (Frame A) ───────────────────────────────────────────
function renderStudentList() {
  const el = document.getElementById('student-list');
  if (!el) return;
  el.innerHTML = STUDENTS.map(s => {
    const m = STATUS_META[s.status];
    const name = s[lang] || s.ko;
    const label = m[lang] || m.ko;
    return `<div class="student-row" style="display:flex;align-items:center;gap:10px;padding:0 18px;height:44px;border-bottom:1px solid #f0f3f8;transition:background .12s;">
      <span style="flex:1;font-size:16px;color:#111827;font-weight:500;">${name}</span>
      <span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:999px;background:${m.bg};color:${m.color};font-size:16px;font-weight:600;white-space:nowrap;">${label}</span>
    </div>`;
  }).join('');
}

// ─── Answer toggle (Frame A) ─────────────────────────────────────────────────
function toggleAnswer() {
  answerRevealed = !answerRevealed;
  const btn = document.getElementById('answer-toggle');
  const knob = document.getElementById('answer-knob');
  const desc = document.getElementById('answer-reveal-desc');
  if (answerRevealed) {
    btn.style.background = '#2563eb';
    knob.style.left = '25px';
    desc.textContent = desc.dataset[lang + 'On'] || desc.dataset.koOn;
  } else {
    btn.style.background = '#d1d5db';
    knob.style.left = '3px';
    desc.textContent = desc.dataset[lang + 'Off'] || desc.dataset.koOff;
  }
}

// ─── Screen share toggle (Frame A) ───────────────────────────────────────────
function toggleProblemShare() {
  sharingProblem = !sharingProblem;
  const btn = document.getElementById('share-problem-btn');
  const label = document.getElementById('share-problem-label');
  if (sharingProblem) {
    btn.style.borderColor = '#2563eb';
    btn.style.background = 'rgba(37,99,235,.08)';
    btn.style.color = '#2563eb';
    label.dataset.ko = '이 문제 공유 중';
    label.dataset.en = 'Sharing this problem';
  } else {
    btn.style.borderColor = '#e5e7eb';
    btn.style.background = '#fff';
    btn.style.color = '#374151';
    label.dataset.ko = '이 문제를 학생 화면에 표시';
    label.dataset.en = 'Display this problem on student screens';
  }
  label.textContent = label.dataset[lang];
}

// ─── OX selection (Frame C) ──────────────────────────────────────────────────
function selectOX(val) {
  oxSelected = val;
  const cardO = document.getElementById('ox-card-o');
  const cardX = document.getElementById('ox-card-x');
  if (val === 'O') {
    cardO.style.borderColor = '#059669';
    cardO.style.background = 'rgba(16,185,129,.08)';
    cardO.querySelector('span').style.color = '#059669';
    cardX.style.borderColor = '#e5e7eb';
    cardX.style.background = '#fff';
    cardX.querySelector('span').style.color = '#d1d5db';
  } else {
    cardX.style.borderColor = '#dc2626';
    cardX.style.background = 'rgba(239,68,68,.08)';
    cardX.querySelector('span').style.color = '#dc2626';
    cardO.style.borderColor = '#e5e7eb';
    cardO.style.background = '#fff';
    cardO.querySelector('span').style.color = '#d1d5db';
  }
}

// ─── Char counter (Frame D) ──────────────────────────────────────────────────
function updateCharCount() {
  const ta = document.getElementById('essay-field') || document.getElementById('essay-input');
  const el = document.getElementById('char-count');
  if (ta && el) el.textContent = ta.value.length + ' / 500';
}

// ─── Language ────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;

  document.querySelectorAll('[data-ko]').forEach(el => {
    const val = el.dataset[l] || el.dataset.ko;
    if (val !== undefined) el.textContent = val;
  });

  // answer reveal desc
  const desc = document.getElementById('answer-reveal-desc');
  if (desc) {
    const key = answerRevealed ? (l + 'On') : (l + 'Off');
    desc.textContent = desc.dataset[key] || desc.dataset.koOff;
  }

  // share label
  const shareLabel = document.getElementById('share-problem-label');
  if (shareLabel) shareLabel.textContent = shareLabel.dataset[l] || shareLabel.dataset.ko;

  // short input placeholder
  const shortInput = document.getElementById('short-answer-input');
  if (shortInput) shortInput.placeholder = l === 'ko' ? '답을 입력하세요' : 'Type your answer';

  // essay placeholder
  const essayField = document.getElementById('essay-field') || document.getElementById('essay-input');
  if (essayField) essayField.placeholder = l === 'ko' ? '서술형 답을 입력하세요' : 'Write your answer here';

  // lang buttons
  document.getElementById('btn-ko').style.cssText = l === 'ko'
    ? 'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    : 'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';
  document.getElementById('btn-en').style.cssText = l === 'en'
    ? 'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    : 'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';

  renderStudentList();
}

// ─── Init ────────────────────────────────────────────────────────────────────
renderStudentList();
setLang('ko');

// essay placeholder init
const ef = document.getElementById('essay-field') || document.getElementById('essay-input');
if (ef) ef.placeholder = '서술형 답을 입력하세요';
const si = document.getElementById('short-answer-input');
if (si) si.placeholder = '답을 입력하세요';
</script>
</body>
