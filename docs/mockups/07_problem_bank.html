<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>07 — 문제 은행 + 문제 생성 + 학생 화면 미리보기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Pretendard',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#dfe4ec;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
a{text-decoration:none;}

/* hover */
.problem-row:hover{background:#f8fafc !important;border-color:#e2e8f0 !important;}
.btn-ghost:hover{background:#f1f5f9 !important;border-color:#cbd5e1 !important;}
.btn-danger-ghost:hover{background:#fef2f2 !important;}
.type-filter:hover:not(.active){background:#f1f5f9 !important;border-color:#cbd5e1 !important;}
.choice-row:hover .choice-delete{opacity:1 !important;}
.tc-row:hover .tc-delete{opacity:1 !important;}
.preview-overlay-close:hover{background:rgba(255,255,255,.12) !important;}

/* focus */
.form-input:focus{outline:none;border-color:#2563eb !important;box-shadow:0 0 0 3px rgba(37,99,235,.15) !important;}
.form-textarea:focus{outline:none;border-color:#2563eb !important;box-shadow:0 0 0 3px rgba(37,99,235,.15) !important;}
</style>
</head>
<body>

<div style="padding:44px 28px 80px;">
<div style="max-width:1260px;margin:0 auto;">

<!-- PAGE HEADER -->
<div style="margin-bottom:12px;">
  <div style="font-size:16px;font-weight:600;color:#8b98a9;letter-spacing:.09em;text-transform:uppercase;margin-bottom:6px;">CodeClan LMS — Mockup 07</div>
  <h1 style="font-size:28px;font-weight:700;letter-spacing:-.02em;color:#1e293b;">문제 은행 + 문제 생성 폼 + 학생 화면 미리보기</h1>
</div>

<!-- LANG TOGGLE -->
<div style="display:flex;align-items:center;gap:8px;margin-bottom:36px;">
  <span style="font-size:16px;color:#64748b;font-weight:500;">언어:</span>
  <button id="btn-ko" onclick="setLang('ko')" style="height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;">한국어</button>
  <button id="btn-en" onclick="setLang('en')" style="height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;">English</button>
</div>


<!-- ═══════════════════════════════════════════════ -->
<!-- FRAME A — 문제 은행 목록 (전역)                  -->
<!-- ═══════════════════════════════════════════════ -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
  <span style="display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:999px;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:700;" data-ko="문제 은행" data-en="Problem Bank"></span>
  <span style="font-size:16px;color:#94a3b8;font-weight:500;" data-ko="전역 문제 목록 + 검색/필터" data-en="Global list with search &amp; filter"></span>
</div>

<div style="border-radius:16px;overflow:hidden;box-shadow:0 24px 52px -18px rgba(15,23,42,.28),0 0 0 1px rgba(15,23,42,.07);margin-bottom:64px;background:#f8fafc;display:flex;flex-direction:column;min-height:600px;">

  <!-- Top nav (global, not class-specific) -->
  <header style="height:60px;padding:0 28px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:14px;">
      <a style="display:flex;align-items:center;gap:6px;font-size:16px;color:#6b7280;font-weight:500;cursor:pointer;" class="btn-ghost" style="padding:4px 8px;border-radius:7px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        <span data-ko="내 수업" data-en="My Classes"></span>
      </a>
      <div style="width:1px;height:20px;background:#e5e7eb;"></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span style="font-size:18px;font-weight:700;color:#111827;" data-ko="문제 은행" data-en="Problem Bank"></span>
      </div>
    </div>
    <button onclick="showFrame('frame-b')" style="display:flex;align-items:center;gap:7px;height:38px;padding:0 16px;background:#2563eb;border:none;border-radius:8px;font-size:16px;font-weight:600;color:#fff;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      <span data-ko="새 문제 만들기" data-en="New Problem"></span>
    </button>
  </header>

  <!-- Toolbar: search + type filter -->
  <div style="padding:16px 28px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <!-- Search -->
    <div style="position:relative;flex:1;min-width:200px;max-width:360px;">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="form-input" type="text" style="width:100%;height:38px;border:1px solid #e5e7eb;border-radius:9px;padding:0 12px 0 38px;font-size:16px;color:#111827;background:#f8fafc;transition:border-color .15s,box-shadow .15s;" placeholder="" id="search-placeholder">
    </div>
    <!-- Type filters -->
    <div id="type-filters" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"></div>
    <!-- Count -->
    <span id="problem-count" style="margin-left:auto;font-size:16px;color:#9ca3af;font-weight:500;white-space:nowrap;"></span>
  </div>

  <!-- Problem list -->
  <div style="flex:1;padding:16px 28px 28px;">
    <div id="problem-list" style="display:flex;flex-direction:column;gap:6px;"></div>
  </div>

</div>
<!-- END FRAME A -->


<!-- ═══════════════════════════════════════════════ -->
<!-- FRAME B — 문제 생성: 객관식                      -->
<!-- ═══════════════════════════════════════════════ -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
  <span style="display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:999px;background:#7c3aed;color:#fff;font-size:16px;font-weight:700;" data-ko="문제 생성" data-en="Create Problem"></span>
  <span style="font-size:16px;color:#94a3b8;font-weight:500;" data-ko="객관식 — 선지 추가/정답 선택 + 우측 학생 미리보기" data-en="MCQ — Choices + live student preview"></span>
</div>

<div id="frame-b" style="border-radius:16px;overflow:hidden;box-shadow:0 24px 52px -18px rgba(15,23,42,.28),0 0 0 1px rgba(15,23,42,.07);margin-bottom:64px;background:#f8fafc;display:flex;flex-direction:column;">

  <!-- Header bar -->
  <header style="height:56px;padding:0 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn-ghost" style="display:flex;align-items:center;gap:6px;height:34px;padding:0 12px;border:1px solid transparent;background:transparent;border-radius:8px;font-size:16px;color:#6b7280;transition:background .15s,border-color .15s;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        <span data-ko="문제 은행" data-en="Problem Bank"></span>
      </button>
      <span style="color:#d1d5db;">/</span>
      <span style="font-size:16px;font-weight:600;color:#111827;" data-ko="새 문제 만들기" data-en="New Problem"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-ghost" style="height:36px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;font-size:16px;color:#374151;transition:background .15s,border-color .15s;" data-ko="임시저장" data-en="Save Draft"></button>
      <button style="height:36px;padding:0 16px;background:#2563eb;border:none;border-radius:8px;font-size:16px;font-weight:600;color:#fff;" data-ko="저장" data-en="Save"></button>
    </div>
  </header>

  <!-- 2-column body -->
  <div style="display:flex;flex:1;gap:0;">

    <!-- LEFT: form -->
    <div style="flex:1;min-width:0;padding:28px;overflow-y:auto;max-height:720px;">

      <!-- Type selector -->
      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:10px;" data-ko="문제 유형" data-en="Problem Type"></label>
        <div id="type-selector" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
      </div>

      <!-- Title -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:8px;" data-ko="문제 제목" data-en="Title"></label>
        <input class="form-input" type="text" style="width:100%;height:46px;border:1.5px solid #e5e7eb;border-radius:10px;padding:0 14px;font-size:16px;color:#111827;background:#fff;transition:border-color .15s,box-shadow .15s;" value="" id="mcq-title">
      </div>

      <!-- Description -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:8px;" data-ko="문제 설명" data-en="Description"></label>
        <textarea class="form-textarea" style="width:100%;min-height:80px;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;font-size:16px;color:#111827;background:#fff;resize:vertical;line-height:1.6;transition:border-color .15s,box-shadow .15s;" id="mcq-desc"></textarea>
      </div>

      <!-- Choices (MCQ specific) -->
      <div>
        <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:10px;" data-ko="선지 (정답을 선택하세요)" data-en="Choices (select correct answer)"></label>
        <div id="choice-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div>
        <button id="add-choice-btn" onclick="addChoice()" style="display:flex;align-items:center;gap:7px;height:40px;padding:0 14px;border:1.5px dashed #d1d5db;background:transparent;border-radius:9px;font-size:16px;color:#9ca3af;transition:border-color .15s,color .15s,background .15s;" class="btn-add-choice">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          <span data-ko="선지 추가" data-en="Add Choice"></span>
        </button>
        <style>.btn-add-choice:hover{border-color:#2563eb !important;color:#2563eb !important;background:rgba(37,99,235,.04) !important;}</style>
      </div>

    </div>

    <!-- RIGHT: student preview -->
    <div style="width:380px;flex-shrink:0;border-left:1px solid #e5e7eb;background:#fff;display:flex;flex-direction:column;">
      <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span style="font-size:16px;font-weight:600;color:#374151;" data-ko="학생 미리보기" data-en="Student Preview"></span>
        <span style="font-size:16px;color:#9ca3af;margin-left:4px;" data-ko="(입력하는 대로 반영됩니다)" data-en="(updates as you type)"></span>
      </div>
      <div style="flex:1;padding:24px 20px;overflow-y:auto;background:#f8fafc;">
        <!-- Simulated student view of MCQ -->
        <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <span style="display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:7px;background:#f1f5f9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;font-weight:700;color:#334155;">P ??</span>
            <span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:999px;background:rgba(124,58,237,.1);color:#7c3aed;font-size:16px;font-weight:600;" data-ko="객관식" data-en="MCQ"></span>
          </div>
          <h3 id="preview-title" style="font-size:17px;font-weight:700;color:#111827;line-height:1.5;margin-bottom:16px;"></h3>
          <div id="preview-choices" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>
        <p style="font-size:16px;color:#9ca3af;text-align:center;margin-top:16px;" data-ko="학생에게 보이는 화면입니다" data-en="This is what the student sees"></p>
      </div>
    </div>

  </div>
</div>
<!-- END FRAME B -->


<!-- ═══════════════════════════════════════════════ -->
<!-- FRAME C — 문제 생성: 코딩 (테스트케이스)          -->
<!-- ═══════════════════════════════════════════════ -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
  <span style="display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:999px;background:#2563eb;color:#fff;font-size:16px;font-weight:700;" data-ko="문제 생성" data-en="Create Problem"></span>
  <span style="font-size:16px;color:#94a3b8;font-weight:500;" data-ko="코딩 — 테스트케이스 편집" data-en="Coding — Test case editor"></span>
</div>

<div style="border-radius:16px;overflow:hidden;box-shadow:0 24px 52px -18px rgba(15,23,42,.28),0 0 0 1px rgba(15,23,42,.07);margin-bottom:64px;background:#f8fafc;display:flex;flex-direction:column;">

  <header style="height:56px;padding:0 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn-ghost" style="display:flex;align-items:center;gap:6px;height:34px;padding:0 12px;border:1px solid transparent;background:transparent;border-radius:8px;font-size:16px;color:#6b7280;transition:background .15s,border-color .15s;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg><span data-ko="문제 은행" data-en="Problem Bank"></span></button>
      <span style="color:#d1d5db;">/</span>
      <span style="font-size:16px;font-weight:600;color:#111827;" data-ko="새 문제 만들기" data-en="New Problem"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-ghost" style="height:36px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;font-size:16px;color:#374151;transition:background .15s,border-color .15s;" data-ko="임시저장" data-en="Save Draft"></button>
      <button style="height:36px;padding:0 16px;background:#2563eb;border:none;border-radius:8px;font-size:16px;font-weight:600;color:#fff;" data-ko="저장" data-en="Save"></button>
    </div>
  </header>

  <div style="padding:28px;max-height:780px;overflow-y:auto;">

    <!-- Type: 코딩 selected -->
    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:10px;" data-ko="문제 유형" data-en="Problem Type"></label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <div style="display:inline-flex;align-items:center;height:34px;padding:0 14px;border-radius:8px;font-size:16px;font-weight:600;border:2px solid #2563eb;background:rgba(37,99,235,.08);color:#2563eb;" data-ko="코딩" data-en="Coding"></div>
        <div style="display:inline-flex;align-items:center;height:34px;padding:0 14px;border-radius:8px;font-size:16px;font-weight:500;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;" data-ko="객관식" data-en="MCQ"></div>
        <div style="display:inline-flex;align-items:center;height:34px;padding:0 14px;border-radius:8px;font-size:16px;font-weight:500;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;" data-ko="단답형" data-en="Short Answer"></div>
        <div style="display:inline-flex;align-items:center;height:34px;padding:0 14px;border-radius:8px;font-size:16px;font-weight:500;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;" data-ko="OX" data-en="T/F"></div>
        <div style="display:inline-flex;align-items:center;height:34px;padding:0 14px;border-radius:8px;font-size:16px;font-weight:500;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;" data-ko="서술형" data-en="Essay"></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div>
        <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:8px;" data-ko="문제 제목" data-en="Title"></label>
        <input class="form-input" type="text" style="width:100%;height:46px;border:1.5px solid #e5e7eb;border-radius:10px;padding:0 14px;font-size:16px;color:#111827;background:#fff;" id="coding-title-input">
      </div>
      <div>
        <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:8px;" data-ko="허용 언어" data-en="Allowed Languages"></label>
        <div style="display:flex;gap:8px;">
          <label style="display:flex;align-items:center;gap:6px;height:46px;padding:0 14px;border:1.5px solid #2563eb;border-radius:10px;background:rgba(37,99,235,.06);font-size:16px;font-weight:600;color:#2563eb;cursor:pointer;">
            <input type="checkbox" checked style="width:16px;height:16px;accent-color:#2563eb;">
            Python 3
          </label>
          <label style="display:flex;align-items:center;gap:6px;height:46px;padding:0 14px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:16px;color:#6b7280;cursor:pointer;">
            <input type="checkbox" style="width:16px;height:16px;accent-color:#2563eb;">
            Java
          </label>
        </div>
      </div>
    </div>

    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:16px;font-weight:600;color:#374151;margin-bottom:8px;" data-ko="문제 설명" data-en="Description"></label>
      <textarea class="form-textarea" style="width:100%;min-height:96px;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;font-size:16px;color:#111827;background:#fff;resize:vertical;line-height:1.6;" id="coding-desc-input"></textarea>
    </div>

    <!-- Test cases -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <label style="font-size:16px;font-weight:600;color:#374151;" data-ko="테스트케이스" data-en="Test Cases"></label>
        <span style="font-size:16px;color:#9ca3af;" data-ko="입력과 예상 출력을 쌍으로 입력하세요" data-en="Enter input/expected output pairs"></span>
      </div>

      <!-- TC table header -->
      <div style="display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;margin-bottom:6px;padding:0 8px;">
        <span style="font-size:16px;font-weight:600;color:#6b7280;" data-ko="입력 (stdin)" data-en="Input (stdin)"></span>
        <span style="font-size:16px;font-weight:600;color:#6b7280;" data-ko="예상 출력" data-en="Expected Output"></span>
        <span></span>
      </div>

      <div id="tc-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div>

      <button id="add-tc-btn" onclick="addTestCase()" style="display:flex;align-items:center;gap:7px;height:40px;padding:0 14px;border:1.5px dashed #d1d5db;background:transparent;border-radius:9px;font-size:16px;color:#9ca3af;transition:border-color .15s,color .15s,background .15s;" class="btn-add-choice">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        <span data-ko="테스트케이스 추가" data-en="Add Test Case"></span>
      </button>

      <!-- Structure check option -->
      <div style="display:flex;align-items:center;gap:10px;margin-top:20px;padding:14px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;">

<script>

let activeFilter = 'all';

  { id:2, type:'coding', ko:'1부터 N까지의 합을 구하시오',   en:'Find the Sum from 1 to N',     date:'2025-06-05' },
  { id:3, type:'mcq',    ko:'자료형 맞추기',                 en:'Match the Data Types',         date:'2025-06-08' },
  { id:4, type:'short',  ko:'리스트 길이 함수는?',           en:'List length function?',        date:'2025-06-10' },
  { id:5, type:'ox',     ko:'변수는 값을 저장하는 공간이다', en:'A variable stores a value.',   date:'2025-06-12' },
  { id:6, type:'essay',  ko:'재귀 함수의 장단점을 서술하시오', en:'Pros and cons of recursion.', date:'2025-06-14' },
];

const TYPE_META = {
  coding: { ko:'코딩',   en:'Coding',        color:'#2563eb', bg:'rgba(37,99,235,.1)'  },
  mcq:    { ko:'객관식', en:'MCQ',           color:'#7c3aed', bg:'rgba(124,58,237,.1)' },
  short:  { ko:'단답형', en:'Short Answer',  color:'#0891b2', bg:'rgba(8,145,178,.1)'  },
  ox:     { ko:'OX',     en:'T/F',           color:'#9d174d', bg:'rgba(244,114,182,.1)'},
  essay:  { ko:'서술형', en:'Essay',         color:'#b45309', bg:'rgba(245,158,11,.1)' },
};

const TYPES_ORDER = ['all','coding','mcq','short','ox','essay'];
const TYPE_LABELS = { all:{ko:'전체',en:'All'}, ...Object.fromEntries(Object.entries(TYPE_META).map(([k,v])=>[k,{ko:v.ko,en:v.en}])) };

// MCQ choices initial state
let choices = [
  { text_ko:'var x = 10',    text_en:'var x = 10' },
  { text_ko:'x = 10',        text_en:'x = 10' },
  { text_ko:'int x = 10',    text_en:'int x = 10' },
  { text_ko:'declare x = 10',text_en:'declare x = 10' },
];

// Test cases initial state
let testCases = [
  { input:'5',  expected:'15' },
  { input:'10', expected:'55' },
  { input:'1',  expected:'1'  },
];

// ─── Frame A ─────────────────────────────────────────────────────────────────
function renderTypeFilters() {
  const el = document.getElementById('type-filters');
  if (!el) return;
  el.innerHTML = TYPES_ORDER.map(t => {
    const label = TYPE_LABELS[t][lang];
    const isActive = activeFilter === t;
    const style = isActive
      ? `background:#0f172a;color:#f1f5f9;border-color:#0f172a;font-weight:600;`
      : `background:#fff;color:#374151;border-color:#e5e7eb;`;
    return `<button class="type-filter${isActive?' active':''}" onclick="setFilter('${t}')" style="height:32px;padding:0 14px;border:1.5px solid;border-radius:999px;font-size:16px;transition:background .15s,border-color .15s;${style}">${label}</button>`;
  }).join('');
}

function setFilter(t) {
  activeFilter = t;
  renderTypeFilters();
  renderProblemList();
}

function renderProblemList() {
  const el = document.getElementById('problem-list');
  const countEl = document.getElementById('problem-count');
  if (!el) return;
  const filtered = activeFilter === 'all' ? PROBLEMS : PROBLEMS.filter(p => p.type === activeFilter);
  const countText = lang === 'ko' ? `${filtered.length}문제` : `${filtered.length} problems`;
  if (countEl) countEl.textContent = countText;

  el.innerHTML = filtered.map(p => {
    const m = TYPE_META[p.type];
    const name = p[lang === 'ko' ? 'ko' : 'en'];
    return `<div class="problem-row" style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #f0f3f8;border-radius:12px;padding:14px 18px;transition:background .12s,border-color .15s;cursor:pointer;">
      <span style="display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:999px;background:${m.bg};color:${m.color};font-size:16px;font-weight:600;white-space:nowrap;flex-shrink:0;">${m[lang]}</span>
      <span style="flex:1;font-size:16px;font-weight:600;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>
      <span style="font-size:16px;color:#9ca3af;font-family:'JetBrains Mono',ui-monospace,monospace;flex-shrink:0;">${p.date}</span>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn-ghost" style="height:32px;padding:0 12px;border:1px solid #e5e7eb;background:#fff;border-radius:7px;font-size:16px;color:#374151;transition:background .15s,border-color .15s;" data-ko="편집" data-en="Edit">${lang==='ko'?'편집':'Edit'}</button>
        <button class="btn-danger-ghost" style="height:32px;padding:0 12px;border:1px solid #fecaca;background:#fff;border-radius:7px;font-size:16px;color:#dc2626;transition:background .15s;" data-ko="삭제" data-en="Delete">${lang==='ko'?'삭제':'Delete'}</button>
      </div>
    </div>`;
  }).join('');
}

// ─── Frame B (MCQ) ───────────────────────────────────────────────────────────
function renderTypeSelector() {
  const el = document.getElementById('type-selector');
  if (!el) return;
  const types = [
    {key:'mcq',    ko:'객관식', en:'MCQ'},
    {key:'coding', ko:'코딩',   en:'Coding'},
    {key:'short',  ko:'단답형', en:'Short Answer'},
    {key:'ox',     ko:'OX',    en:'T/F'},
    {key:'essay',  ko:'서술형', en:'Essay'},
  ];
  el.innerHTML = types.map((t, i) => {
    const isActive = t.key === 'mcq';
    const style = isActive
      ? `border:2px solid #7c3aed;background:rgba(124,58,237,.08);color:#7c3aed;font-weight:600;`
      : `border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;`;
    return `<div style="display:inline-flex;align-items:center;height:34px;padding:0 14px;border-radius:8px;font-size:16px;cursor:pointer;${style}">${t[lang]}</div>`;
  }).join('');
}

function renderChoices() {
  const el = document.getElementById('choice-list');
  const previewEl = document.getElementById('preview-choices');
  if (!el) return;

  el.innerHTML = choices.map((c, i) => {
    const isCorrect = correctChoice === i;
    const text = c[lang === 'ko' ? 'text_ko' : 'text_en'];
    return `<div class="choice-row" style="display:flex;align-items:center;gap:10px;">
      <label style="display:flex;align-items:center;gap:8px;flex:1;padding:10px 14px;border:1.5px solid ${isCorrect?'#059669':'#e5e7eb'};border-radius:10px;background:${isCorrect?'rgba(16,185,129,.06)':'#fff'};cursor:pointer;">
        <input type="radio" name="correct" ${isCorrect?'checked':''} onclick="setCorrect(${i})" style="width:18px;height:18px;accent-color:#059669;flex-shrink:0;">
        <input type="text" class="form-input" value="${text}" style="flex:1;border:none;background:transparent;font-size:16px;color:#111827;outline:none;min-width:0;" placeholder="">
        ${isCorrect?`<span style="font-size:16px;font-weight:600;color:#059669;flex-shrink:0;" data-ko="정답" data-en="Answer">${lang==='ko'?'정답':'Answer'}</span>`:''}
      </label>
      <button class="choice-delete" onclick="removeChoice(${i})" style="width:32px;height:32px;border-radius:7px;border:1px solid #fecaca;background:#fff;color:#dc2626;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .15s;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>`;
  }).join('');

  if (previewEl) {
    previewEl.innerHTML = choices.map((c, i) => {
      const isCorrect = correctChoice === i;
      const text = c[lang === 'ko' ? 'text_ko' : 'text_en'];
      return `<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid ${isCorrect?'#e5e7eb':'#e5e7eb'};border-radius:9px;background:#fff;cursor:pointer;">
        <input type="radio" name="preview-ans" style="width:16px;height:16px;accent-color:#2563eb;flex-shrink:0;" ${i===2?'checked':''}>
        <span style="font-size:16px;color:#374151;">${String.fromCharCode(9312+i)}  ${text}</span>
      </label>`;
    }).join('');
  }
}

function setCorrect(i) { correctChoice = i; renderChoices(); }
function addChoice() {
  choices.push({ text_ko:`선지 ${choices.length+1}`, text_en:`Choice ${choices.length+1}` });
  renderChoices();
}
function removeChoice(i) {
  if (choices.length <= 2) return;
  choices.splice(i, 1);
  if (correctChoice >= choices.length) correctChoice = choices.length - 1;
  renderChoices();
}

// Preview title sync
function syncPreviewTitle() {
  const input = document.getElementById('mcq-title');
  const preview = document.getElementById('preview-title');
  if (input && preview) {
    input.addEventListener('input', () => { preview.textContent = input.value; });
  }
}

// ─── Frame C (Coding) ────────────────────────────────────────────────────────
function renderTestCases() {
  const el = document.getElementById('tc-list');
  if (!el) return;
  el.innerHTML = testCases.map((tc, i) => `
    <div class="tc-row" style="display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;align-items:center;">
      <div style="position:relative;">
        <input class="form-input" type="text" value="${tc.input}" style="width:100%;height:42px;border:1.5px solid #e5e7eb;border-radius:9px;padding:0 12px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;color:#111827;background:#fff;transition:border-color .15s,box-shadow .15s;">
      </div>
      <div style="position:relative;">
        <input class="form-input" type="text" value="${tc.expected}" style="width:100%;height:42px;border:1.5px solid #e5e7eb;border-radius:9px;padding:0 12px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;color:#111827;background:#fff;transition:border-color .15s,box-shadow .15s;">
      </div>
      <button class="tc-delete" onclick="removeTC(${i})" style="height:42px;width:42px;border:1px solid #fecaca;background:#fff;border-radius:9px;color:#dc2626;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>
      </button>
    </div>`).join('');
}
function addTestCase() {
  testCases.push({ input:'', expected:'' });
  renderTestCases();
}
function removeTC(i) {
  testCases.splice(i, 1);
  renderTestCases();
}

// ─── Language ────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-ko]').forEach(el => {
    const val = el.dataset[l] || el.dataset.ko;
    if (val !== undefined) el.textContent = val;
  });

  const sp = document.getElementById('search-placeholder');
  if (sp) sp.placeholder = l === 'ko' ? '문제 제목으로 검색...' : 'Search by title...';

  const mcqTitleInput = document.getElementById('mcq-title');
  if (mcqTitleInput) mcqTitleInput.value = l === 'ko' ? '파이썬에서 변수를 선언하는 올바른 방법은?' : 'Which is the correct way to declare a variable in Python?';

  const mcqDesc = document.getElementById('mcq-desc');
  if (mcqDesc) mcqDesc.value = l === 'ko' ? '아래 보기 중 파이썬에서 올바른 변수 선언 방법을 고르시오.' : 'Choose the correct variable declaration syntax in Python from the options below.';

  const codingTitle = document.getElementById('coding-title-input');
  if (codingTitle) codingTitle.value = l === 'ko' ? '1부터 N까지의 합을 구하시오' : 'Find the Sum from 1 to N';

  const codingDesc = document.getElementById('coding-desc-input');
  if (codingDesc) codingDesc.value = l === 'ko' ? '정수 N이 주어졌을 때, 1부터 N까지 모든 정수의 합을 구하는 프로그램을 작성하시오.' : 'Given integer N, write a program that computes the sum of all integers from 1 to N.';

  const previewTitle = document.getElementById('preview-title');
  if (previewTitle) previewTitle.textContent = mcqTitleInput ? mcqTitleInput.value : '';

  document.getElementById('btn-ko').style.cssText = l==='ko'
    ? 'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    : 'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';
  document.getElementById('btn-en').style.cssText = l==='en'
    ? 'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    : 'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';

  renderTypeFilters();
  renderProblemList();
  renderTypeSelector();
  renderChoices();
}

function showFrame(id) {
  document.getElementById(id)?.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ─── Init ────────────────────────────────────────────────────────────────────
renderTypeFilters();
renderProblemList();
renderTypeSelector();
renderChoices();
renderTestCases();
setLang('ko');
syncPreviewTitle();
</script>
</body>
</html>
