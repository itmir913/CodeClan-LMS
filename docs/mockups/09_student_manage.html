<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>09 — 학생 관리 (목록 / CSV 임포트 / 개별 추가)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Pretendard',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#dfe4ec;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

.nav-back:hover{color:#93c5fd !important;background:rgba(255,255,255,.04) !important;}
.nav-item:hover{background:rgba(255,255,255,.05) !important;color:#e2e8f0 !important;}
.nav-user:hover{background:rgba(255,255,255,.06) !important;}

.btn-ghost:hover{background:#f1f5f9 !important;border-color:#cbd5e1 !important;}
.btn-danger-ghost:hover{background:#fef2f2 !important;border-color:#fca5a5 !important;}
.student-row:hover{background:#f8fafc !important;}
.drop-zone-active{border-color:#2563eb !important;background:rgba(37,99,235,.05) !important;}
.mapping-row:hover{background:#f8fafc;}

/* drag-over highlight via JS class */
</style>
</head>
<body>
<div style="padding:44px 28px 80px;">
<div style="max-width:1260px;margin:0 auto;">

<!-- PAGE HEADER -->
<div style="margin-bottom:12px;">
  <div style="font-size:16px;font-weight:600;color:#8b98a9;letter-spacing:.09em;text-transform:uppercase;margin-bottom:6px;">CodeClan LMS — Mockup 09</div>
  <h1 style="font-size:28px;font-weight:700;letter-spacing:-.02em;color:#1e293b;">학생 관리 — 목록 / CSV 임포트 / 개별 추가</h1>
</div>

<!-- LANG TOGGLE -->
<div style="display:flex;align-items:center;gap:8px;margin-bottom:36px;">
  <span style="font-size:16px;color:#64748b;font-weight:500;">언어:</span>
  <button id="btn-ko" onclick="setLang('ko')" style="height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;">한국어</button>
  <button id="btn-en" onclick="setLang('en')" style="height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;">English</button>
</div>


<!-- ════════════════════════════════════════════════════ -->
<!-- FRAME A — 학생 목록                                  -->
<!-- ════════════════════════════════════════════════════ -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
  <span style="display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:999px;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:700;" data-ko="학생 탭" data-en="Students Tab"></span>
  <span style="font-size:16px;color:#94a3b8;font-weight:500;" data-ko="수업 내 학생 명단 관리" data-en="Manage student roster for this class"></span>
</div>

<div style="display:flex;align-items:stretch;border-radius:16px;overflow:hidden;box-shadow:0 24px 52px -18px rgba(15,23,42,.28),0 0 0 1px rgba(15,23,42,.07);margin-bottom:64px;min-height:600px;">
  <aside style="width:240px;flex-shrink:0;background:#0f172a;display:flex;flex-direction:column;">
    <div style="padding:20px 16px 0;"><button class="nav-back" style="display:flex;align-items:center;gap:7px;height:34px;padding:0 8px;margin:0 -8px;border:none;background:transparent;border-radius:7px;color:#64748b;font-size:16px;transition:color .15s,background .15s;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg><span data-ko="내 수업" data-en="My Classes"></span></button><div style="margin-top:16px;padding-bottom:20px;"><div style="font-size:17px;font-weight:700;color:#f1f5f9;" data-ko="정보과학 1반" data-en="CS Class 1"></div><div style="font-size:16px;color:#64748b;margin-top:4px;" data-ko="3학년 1반 · 정보과" data-en="Grade 3–1 · Informatics"></div></div></div>
    <div style="height:1px;background:#1e293b;margin:0 16px;"></div>
    <nav style="padding:12px 10px 0;display:flex;flex-direction:column;gap:2px;">
      <a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span data-ko="차시" data-en="Lessons"></span></a>
      <a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg><span data-ko="출석" data-en="Attendance"></span></a>
      <a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg><span data-ko="수업 운영" data-en="Assessments"></span></a>
    </nav>
    <div style="flex:1;"></div>
    <div style="height:1px;background:#1e293b;margin:0 16px 12px;"></div>
    <nav style="padding:0 10px;display:flex;flex-direction:column;gap:2px;">
      <a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg><span data-ko="수업 관리" data-en="Class Settings"></span></a>
      <!-- 학생 active -->
      <a style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;box-shadow:inset 3px 0 0 #93c5fd;background:rgba(147,197,253,.1);color:#f8fafc;font-size:16px;font-weight:600;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span data-ko="학생" data-en="Students"></span></a>
    </nav>
    <div style="padding:10px 10px 18px;margin-top:8px;"><button class="nav-user" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:transparent;border-radius:9px;text-align:left;transition:background .15s;"><div style="width:34px;height:34px;border-radius:999px;background:rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#93c5fd;" data-ko="김" data-en="K"></div><span style="flex:1;font-size:16px;font-weight:500;color:#b8c5d3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" data-ko="김정보 선생님" data-en="Teacher Kim"></span></button></div>
  </aside>

  <div style="flex:1;min-width:0;background:#f8fafc;display:flex;flex-direction:column;">
    <header style="height:64px;padding:0 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span style="font-size:18px;font-weight:600;color:#111827;" data-ko="정보과학 1반" data-en="CS Class 1"></span>
    </header>

    <div style="padding:26px 28px 32px;flex:1;overflow-y:auto;">
      <!-- Header row -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
        <div>
          <h2 style="font-size:20px;font-weight:700;color:#111827;margin-bottom:4px;" data-ko="학생 명단" data-en="Student Roster"></h2>
          <p style="font-size:16px;color:#9ca3af;" id="student-count-label"></p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <!-- Search -->
          <div style="position:relative;">
            <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="student-search" type="text" oninput="filterStudents(this.value)" style="height:36px;width:200px;border:1px solid #e5e7eb;border-radius:8px;padding:0 12px 0 32px;font-size:16px;background:#fff;" placeholder="">
          </div>
          <button onclick="openAddModal()" class="btn-ghost" style="display:flex;align-items:center;gap:6px;height:36px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;font-size:16px;color:#374151;transition:background .15s,border-color .15s;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            <span data-ko="개별 추가" data-en="Add Student"></span>
          </button>
          <button onclick="goToImport()" style="display:flex;align-items:center;gap:6px;height:36px;padding:0 14px;background:#2563eb;border:none;border-radius:8px;font-size:16px;font-weight:600;color:#fff;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span data-ko="CSV 임포트" data-en="Import CSV"></span>
          </button>
        </div>
      </div>

      <!-- Student table -->
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
        <!-- Table header -->
        <div style="display:grid;grid-template-columns:56px 1fr 100px 160px 120px;padding:0;border-bottom:1px solid #e5e7eb;">
          <div style="padding:11px 16px;font-size:16px;font-weight:600;color:#9ca3af;background:#f8fafc;" data-ko="번호" data-en="No."></div>
          <div style="padding:11px 16px;font-size:16px;font-weight:600;color:#9ca3af;background:#f8fafc;" data-ko="이름" data-en="Name"></div>
          <div style="padding:11px 12px;font-size:16px;font-weight:600;color:#9ca3af;background:#f8fafc;text-align:center;" data-ko="학번" data-en="Student ID"></div>
          <div style="padding:11px 16px;font-size:16px;font-weight:600;color:#9ca3af;background:#f8fafc;" data-ko="수행평가 참여" data-en="Assessments"></div>
          <div style="padding:11px 16px;font-size:16px;font-weight:600;color:#9ca3af;background:#f8fafc;"></div>
        </div>
        <!-- Rows -->
        <div id="student-rows"></div>
      </div>

      <div style="margin-top:12px;text-align:center;" id="pagination-row"></div>
    </div>
  </div>
</div>
<!-- END FRAME A -->


<!-- ════════════════════════════════════════════════════ -->
<!-- FRAME B — CSV 임포트: 파일 업로드                     -->
<!-- ════════════════════════════════════════════════════ -->
<div id="frame-b-import" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
  <span style="display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:999px;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:700;" data-ko="CSV 임포트" data-en="CSV Import"></span>
  <span style="font-size:16px;color:#94a3b8;font-weight:500;" data-ko="파일 업로드 → 열 매핑 확인 → 가져오기" data-en="Upload file → Confirm column mapping → Import"></span>
</div>

<div style="display:flex;align-items:stretch;border-radius:16px;overflow:hidden;box-shadow:0 24px 52px -18px rgba(15,23,42,.28),0 0 0 1px rgba(15,23,42,.07);margin-bottom:64px;min-height:580px;">
  <!-- Sidebar (학생 active) — identical to Frame A -->
  <aside style="width:240px;flex-shrink:0;background:#0f172a;display:flex;flex-direction:column;">
    <div style="padding:20px 16px 0;"><button class="nav-back" style="display:flex;align-items:center;gap:7px;height:34px;padding:0 8px;margin:0 -8px;border:none;background:transparent;border-radius:7px;color:#64748b;font-size:16px;transition:color .15s,background .15s;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg><span data-ko="내 수업" data-en="My Classes"></span></button><div style="margin-top:16px;padding-bottom:20px;"><div style="font-size:17px;font-weight:700;color:#f1f5f9;" data-ko="정보과학 1반" data-en="CS Class 1"></div><div style="font-size:16px;color:#64748b;margin-top:4px;" data-ko="3학년 1반 · 정보과" data-en="Grade 3–1 · Informatics"></div></div></div>
    <div style="height:1px;background:#1e293b;margin:0 16px;"></div>
    <nav style="padding:12px 10px 0;display:flex;flex-direction:column;gap:2px;"><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span data-ko="차시" data-en="Lessons"></span></a><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg><span data-ko="출석" data-en="Attendance"></span></a><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg><span data-ko="수업 운영" data-en="Assessments"></span></a></nav>
    <div style="flex:1;"></div>
    <div style="height:1px;background:#1e293b;margin:0 16px 12px;"></div>
    <nav style="padding:0 10px;display:flex;flex-direction:column;gap:2px;"><a class="nav-item" style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;color:#64748b;font-size:16px;font-weight:500;flex-shrink:0;transition:background .15s,color .15s;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg><span data-ko="수업 관리" data-en="Class Settings"></span></a><a style="display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border-radius:8px;box-shadow:inset 3px 0 0 #93c5fd;background:rgba(147,197,253,.1);color:#f8fafc;font-size:16px;font-weight:600;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span data-ko="학생" data-en="Students"></span></a></nav>
    <div style="padding:10px 10px 18px;margin-top:8px;"><button class="nav-user" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:transparent;border-radius:9px;text-align:left;transition:background .15s;"><div style="width:34px;height:34px;border-radius:999px;background:rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#93c5fd;" data-ko="김" data-en="K"></div><span style="flex:1;font-size:16px;font-weight:500;color:#b8c5d3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" data-ko="김정보 선생님" data-en="Teacher Kim"></span></button></div>
  </aside>

  <div style="flex:1;min-width:0;background:#f8fafc;display:flex;flex-direction:column;">
    <header style="height:64px;padding:0 24px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;flex-shrink:0;">
      <!-- Step indicator -->
      <div style="display:flex;align-items:center;gap:0;">
        <div style="display:flex;align-items:center;gap:8px;padding:0 16px 0 0;">
          <div style="width:26px;height:26px;border-radius:999px;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;">1</div>
          <span style="font-size:16px;font-weight:700;color:#2563eb;" data-ko="파일 선택" data-en="Select File"></span>
        </div>
        <div style="width:32px;height:1px;background:#e5e7eb;"></div>
        <div style="display:flex;align-items:center;gap:8px;padding:0 16px;">
          <div style="width:26px;height:26px;border-radius:999px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#9ca3af;">2</div>
          <span style="font-size:16px;font-weight:500;color:#9ca3af;" data-ko="열 매핑 확인" data-en="Verify Columns"></span>
        </div>
        <div style="width:32px;height:1px;background:#e5e7eb;"></div>
        <div style="display:flex;align-items:center;gap:8px;padding:0 0 0 16px;">
          <div style="width:26px;height:26px;border-radius:999px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#9ca3af;">3</div>
          <span style="font-size:16px;font-weight:500;color:#9ca3af;" data-ko="가져오기" data-en="Import"></span>
        </div>
      </div>
    </header>

    <div style="padding:32px 40px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;">

      <!-- Drop zone -->
      <div id="drop-zone" ondragover="event.preventDefault();this.classList.add('drop-zone-active')" ondragleave="this.classList.remove('drop-zone-active')" ondrop="handleDrop(event)"
        style="width:100%;max-width:600px;border:2px dashed #d1d5db;border-radius:16px;padding:52px 32px;text-align:center;background:#fff;transition:border-color .15s,background .15s;cursor:pointer;"
        onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".csv,.xlsx" style="display:none;" onchange="handleFileSelect(this)">
        <div style="width:56px;height:56px;border-radius:14px;background:rgba(37,99,235,.08);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>

  ['5','정도현','3','1','비고있음'],
];
const PREVIEW_ROWS_EN = [
  ['1','Min-su K.','3','1',''],
  ['2','Su-bin L.','3','1',''],
  ['3','Ji-hun P.','3','1',''],
  ['4','Ye-eun C.','3','1',''],
  ['5','Do-hyeon J.','3','1','has note'],
];

// ─── Frame A: student list ────────────────────────────────────────────────────
function renderStudentRows(query) {
  const el = document.getElementById('student-rows');
  const countEl = document.getElementById('student-count-label');
  const pageEl = document.getElementById('pagination-row');
  if (!el) return;

  const src = lang === 'ko' ? STUDENTS_KO : STUDENTS_EN;
  const q = (query || '').toLowerCase();
  const filtered = q ? src.filter(s => s.name.toLowerCase().includes(q)) : src;

  if (countEl) countEl.textContent = lang === 'ko'
    ? `전체 32명 중 ${filtered.length}명 표시`
    : `Showing ${filtered.length} of 32 students`;

  if (filtered.length === 0) {
    el.innerHTML = `<div style="padding:40px;text-align:center;color:#9ca3af;font-size:16px;">${lang==='ko'?'검색 결과가 없습니다.':'No students found.'}</div>`;
    if (pageEl) pageEl.innerHTML = '';
    return;
  }

  const assessLabel = lang === 'ko' ? '회 참여' : ' assessments';
  el.innerHTML = filtered.map(s =>
    `<div class="student-row" style="display:grid;grid-template-columns:56px 1fr 100px 160px 120px;border-bottom:1px solid #f0f3f8;transition:background .1s;">
      <div style="padding:13px 16px;font-size:16px;color:#9ca3af;font-family:'JetBrains Mono',ui-monospace,monospace;">${s.no}</div>
      <div style="padding:13px 16px;font-size:16px;font-weight:600;color:#111827;">${s.name}</div>
      <div style="padding:13px 12px;font-size:16px;color:#6b7280;font-family:'JetBrains Mono',ui-monospace,monospace;text-align:center;">${s.id}</div>
      <div style="padding:13px 16px;display:flex;align-items:center;gap:6px;">
        <div style="display:flex;gap:3px;">${[...Array(3)].map((_,i)=>`<span style="width:8px;height:8px;border-radius:999px;background:${i<s.assessments?'#2563eb':'#e5e7eb'};"></span>`).join('')}</div>
        <span style="font-size:16px;color:#6b7280;">${s.assessments}${assessLabel}</span>
      </div>
      <div style="padding:10px 16px;display:flex;align-items:center;gap:6px;justify-content:flex-end;">
        <button class="btn-ghost" style="height:30px;padding:0 12px;border:1px solid #e5e7eb;background:#fff;border-radius:7px;font-size:16px;color:#374151;transition:background .15s,border-color .15s;" data-ko="편집" data-en="Edit">${lang==='ko'?'편집':'Edit'}</button>
        <button class="btn-danger-ghost" style="height:30px;padding:0 10px;border:1px solid #fecaca;background:#fff;border-radius:7px;font-size:16px;color:#dc2626;transition:background .15s,border-color .15s;" data-ko="삭제" data-en="Del">${lang==='ko'?'삭제':'Del'}</button>
      </div>
    </div>`
  ).join('');

  if (pageEl) pageEl.innerHTML = `<span style="font-size:16px;color:#9ca3af;">${lang==='ko'?`8명 표시 중 · 전체 32명 보기 →`:`Showing 8 · View all 32 →`}</span>`;
}

function filterStudents(q) { renderStudentRows(q); }
function openAddModal() {
  document.getElementById('frame-b-import')?.scrollIntoView({ behavior:'smooth', block:'start' });
}
function goToImport() {
  document.getElementById('frame-b-import')?.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ─── Frame B: column guide ────────────────────────────────────────────────────
function renderColGuide() {
  const el = document.getElementById('col-guide');
  if (!el) return;
  el.innerHTML = COL_GUIDE.map((g, i) => {
    const field = g.field[lang] || g.field.ko;
    const req = g.required
      ? `<span style="font-size:16px;font-weight:700;color:#dc2626;" data-ko="필수" data-en="required">${lang==='ko'?'필수':'required'}</span>`
      : `<span style="font-size:16px;color:#9ca3af;" data-ko="선택" data-en="optional">${lang==='ko'?'선택':'optional'}</span>`;
    return `<div style="display:grid;grid-template-columns:140px 1fr;border-bottom:${i<COL_GUIDE.length-1?'1px solid #f0f3f8':'none'};padding:12px 20px;align-items:center;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:16px;font-weight:700;color:#374151;">${field}</span>
        ${req}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">${g.synonyms.map(s => `<code style="font-size:16px;padding:2px 8px;background:#f1f5f9;border-radius:5px;color:#475569;font-family:'JetBrains Mono',ui-monospace,monospace;">${s}</code>`).join('')}</div>
    </div>`;
  }).join('');
}

// ─── Frame C: column mapping ──────────────────────────────────────────────────
const FIELD_OPTIONS_KO = ['번호','이름','학년','반','무시(건너뜀)'];
const FIELD_OPTIONS_EN = ['Seat No.','Name','Grade','Class No.','Ignore'];
const FIELD_KEYS      = ['student_number','name','grade','class_no','ignore'];

function renderMappingRows() {
  const el = document.getElementById('mapping-rows');
  if (!el) return;
  const opts = lang === 'ko' ? FIELD_OPTIONS_KO : FIELD_OPTIONS_EN;
  el.innerHTML = DETECTED_COLS.map((c, i) => {
    const methodBadge = c.method === 'exact'
      ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:16px;font-weight:600;color:#059669;">${lang==='ko'?'✓ 정확히 일치':'✓ Exact match'}</span>`
      : c.method === 'synonym'
      ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:16px;font-weight:600;color:#d97706;">${lang==='ko'?'≈ 동의어':'≈ Synonym'}</span>`
      : `<span style="display:inline-flex;align-items:center;gap:4px;font-size:16px;color:#9ca3af;">${lang==='ko'?'— 해당 없음':'— No match'}</span>`;

    const selIdx = FIELD_KEYS.indexOf(c.mapped);
    const optHtml = opts.map((o, oi) =>
      `<option value="${FIELD_KEYS[oi]}" ${oi===selIdx?'selected':''}>${o}</option>`
    ).join('');

    const bgRow = c.method === 'none' ? 'background:rgba(245,158,11,.04);' : '';

    return `<div class="mapping-row" style="display:grid;grid-template-columns:1fr 40px 1fr 120px;padding:11px 20px;align-items:center;border-bottom:1px solid #f8fafc;${bgRow}transition:background .1s;">
      <div style="display:flex;align-items:center;gap:8px;">
        <code style="font-size:16px;padding:3px 10px;background:#f1f5f9;border-radius:6px;color:#475569;font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:600;">${c.raw}</code>
      </div>
      <div style="text-align:center;color:#9ca3af;font-size:18px;">→</div>
      <div>
        <select onchange="updateMapping(${i}, this.value)" style="height:34px;padding:0 10px;border:1.5px solid ${c.method==='none'?'#fbbf24':'#e5e7eb'};border-radius:8px;font-size:16px;background:#fff;color:#374151;min-width:160px;">
          ${optHtml}
        </select>
      </div>
      <div>${methodBadge}</div>
    </div>`;
  }).join('');
  updateImportReadyLabel();
}

function updateMapping(i, val) {
  DETECTED_COLS[i].mapped = val;
  DETECTED_COLS[i].method = val === 'ignore' ? 'none' : 'manual';
  renderMappingRows();
  renderPreviewTable();
}

function updateImportReadyLabel() {
  const el = document.getElementById('import-ready-label');
  if (!el) return;
  const hasMissing = COL_GUIDE.filter(g => g.required).some(g =>
    !DETECTED_COLS.some(c => c.mapped === g.key)
  );
  el.textContent = hasMissing
    ? (lang==='ko'?'필수 필드가 매핑되지 않았습니다':'Required fields not mapped')
    : '';
  el.style.color = hasMissing ? '#dc2626' : '#059669';
}

// ─── Frame C: preview table ───────────────────────────────────────────────────
function renderPreviewTable() {
  const el = document.getElementById('preview-table');
  if (!el) return;
  const rows = lang === 'ko' ? PREVIEW_ROWS : PREVIEW_ROWS_EN;
  const thStyle = 'padding:10px 14px;font-size:16px;font-weight:600;color:#6b7280;text-align:left;border-bottom:1px solid #e5e7eb;background:#f8fafc;white-space:nowrap;';
  const tdStyle = 'padding:10px 14px;font-size:16px;color:#374151;border-bottom:1px solid #f8fafc;font-family:\"JetBrains Mono\",ui-monospace,monospace;';

  const activeCols = DETECTED_COLS.filter(c => c.mapped !== 'ignore');
  const ignCols = new Set(DETECTED_COLS.filter(c => c.mapped === 'ignore').map(c => c.raw));
  const fieldLabel = (key) => {
    const g = COL_GUIDE.find(g => g.key === key);
    if (!g) return key;
    return g.field[lang] || g.field.ko;
  };

  const header = `<thead><tr>${DETECTED_COLS.map(c => {
    const ign = c.mapped === 'ignore';
    return `<th style="${thStyle}${ign?'color:#d1d5db;text-decoration:line-through;':''}">${c.raw}${!ign?`<div style="font-size:16px;color:#2563eb;font-weight:500;font-family:system-ui;">→ ${fieldLabel(c.mapped)}</div>`:''}</th>`;
  }).join('')}</tr></thead>`;

  const body = `<tbody>${rows.map(row =>
    `<tr>${row.map((cell, ci) => {
      const ign = DETECTED_COLS[ci]?.mapped === 'ignore';
      return `<td style="${tdStyle}${ign?'color:#d1d5db;':''}">${cell || '—'}</td>`;
    }).join('')}</tr>`
  ).join('')}</tbody>`;

  el.innerHTML = header + body;
}

// ─── Misc ─────────────────────────────────────────────────────────────────────
function setDupMode(mode) {
  dupMode = mode;
  const skip = document.getElementById('dup-skip');
  const upd  = document.getElementById('dup-update');
  if (skip) { skip.style.background = mode==='skip'?'#0f172a':'transparent'; skip.style.color = mode==='skip'?'#f8fafc':'#6b7280'; }
  if (upd)  { upd.style.background  = mode==='update'?'#0f172a':'transparent'; upd.style.color  = mode==='update'?'#f8fafc':'#6b7280'; }
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone')?.classList.remove('drop-zone-active');
  alert(lang==='ko'?'[파일이 선택됨 — 열 매핑 단계로 이동합니다 (Frame C 참고)]':'[File selected — proceed to column mapping (see Frame C)]');
}
function handleFileSelect(inp) {
  if (inp.files.length) alert(lang==='ko'?'[파일이 선택됨 — 열 매핑 단계로 이동합니다 (Frame C 참고)]':'[File selected — see Frame C for mapping step]');
}
function confirmImport() {
  alert(lang==='ko'?'[32명 가져오기 완료 → 학생 목록으로 이동]':'[Import 32 students → back to student list]');
}

// ─── Language ─────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-ko]').forEach(el => {
    const val = el.dataset[l] || el.dataset.ko;
    if (val !== undefined) el.textContent = val;
  });

  // placeholders
  const ss = document.getElementById('student-search');
  if (ss) ss.placeholder = l==='ko'?'이름 검색...':'Search name...';
  const an = document.getElementById('add-name-placeholder');
  if (an) an.placeholder = l==='ko'?'예: 김민수':'e.g. Min-su Kim';

  document.getElementById('btn-ko').style.cssText = l==='ko'
    ?'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    :'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';
  document.getElementById('btn-en').style.cssText = l==='en'
    ?'height:30px;padding:0 14px;border-radius:999px;border:none;background:#0f172a;color:#93c5fd;font-size:16px;font-weight:600;cursor:pointer;'
    :'height:30px;padding:0 14px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#64748b;font-size:16px;font-weight:500;cursor:pointer;';

  renderStudentRows('');
  renderColGuide();
  renderMappingRows();
  renderPreviewTable();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderStudentRows('');
renderColGuide();
renderMappingRows();
renderPreviewTable();
setLang('ko');
</script>
